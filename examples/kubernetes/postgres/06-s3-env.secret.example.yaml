# Copy to 06-s3-env.secret.yaml, fill in values, apply. Do not commit real credentials.
#
#   cp 06-s3-env.secret.example.yaml 06-s3-env.secret.yaml
#   kubectl apply -f 06-s3-env.secret.yaml
#
# Cloudflare R2: use the R2 S3 API Access Key ID + Secret Access Key (not the account API token).
apiVersion: v1
kind: Secret
metadata:
  name: buildkit-s3-env
  namespace: buildkit
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
  AWS_BUCKET: "buildkit-hive-test"
  # R2 accepts "auto"; any value works for custom endpoints.
  AWS_REGION: "auto"
  AWS_ENDPOINT_URL: "https://REPLACE_ACCOUNT_ID.r2.cloudflarestorage.com"
